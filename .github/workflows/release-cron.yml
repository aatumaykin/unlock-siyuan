name: Release Cron

# Checks if a newer upstream version is available vs the VERSION file.
# Signal-only: opens an issue to notify. Bumping VERSION and releasing is manual.
# (Manual flow: verify patches apply → bump VERSION → commit/tag → trigger release workflows.)

on:
  schedule:
    - cron: "0 12 * * 2,5"
  workflow_dispatch:

jobs:
  check-upstream:
    name: Check for upstream updates
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    if: github.repository == 'aatumaykin/unlock-siyuan'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compare versions
        id: version
        run: |
          # Current upstream tracked in VERSION file.
          source VERSION
          CURRENT="${UPSTREAM_VERSION}"

          # Latest upstream version.
          packageJson=$(wget -qO- -t3 -T30 "https://raw.githubusercontent.com/siyuan-note/siyuan/master/app/package.json")
          LATEST=$(echo "${packageJson}" | grep '"version"' | head -n 1 | awk -F ":" '{print $2}' | sed 's/\"//g;s/,//g;s/ //g')

          echo "current (VERSION): ${CURRENT}"
          echo "latest (upstream): ${LATEST}"

          # Verify patches apply to the new tag before signalling (avoids noise on broken patches).
          git clone --branch "v${LATEST}" --depth=1 --quiet https://github.com/siyuan-note/siyuan.git /tmp/siyuan
          cd /tmp/siyuan
          PATCH_OK=true
          for patch in "$GITHUB_WORKSPACE"/.patches/*.patch; do
            if ! git apply --check "$patch" 2>/dev/null; then
              PATCH_OK=false
              echo "⚠ patch $(basename "$patch") does NOT apply to v${LATEST}"
            fi
          done

          echo "current=${CURRENT}" >> $GITHUB_OUTPUT
          echo "latest=${LATEST}" >> $GITHUB_OUTPUT
          if [ "${CURRENT}" != "${LATEST}" ]; then
            echo "update_available=true" >> $GITHUB_OUTPUT
          else
            echo "update_available=false" >> $GITHUB_OUTPUT
          fi
          echo "patch_ok=${PATCH_OK}" >> $GITHUB_OUTPUT

      - name: Open update issue
        if: steps.version.outputs.update_available == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ steps.version.outputs.current }}';
            const latest = '${{ steps.version.outputs.latest }}';
            const patchOk = '${{ steps.version.outputs.patch_ok }}' === 'true';

            const title = `⬆️ Upstream update available: ${latest}`;
            const body = [
              `New upstream version **${latest}** is available (currently tracking **${current}**).`,
              ``,
              patchOk
                ? `✅ All patches apply cleanly to \`v${latest}\`.`
                : `⚠️ **Some patches do NOT apply** to \`v${latest}\` — manual rebase needed before bumping.`,
              ``,
              `**Manual steps to release:**`,
              `1. Verify patches against \`v${latest}\` locally`,
              `2. Bump \`VERSION\`: \`UPSTREAM_VERSION=${latest}\`, reset \`PATCH_REVISION=p1\``,
              `3. Commit & push, tag \`v${latest}-p1\``,
              `4. Trigger release workflows (docker/desktop/android/ios)`,
              ``,
              `_This issue was created automatically by release-cron._`,
            ].join('\n');

            // Skip if an open issue with this title already exists.
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });
            const exists = issues.some(i => i.title === title);
            if (exists) {
              core.info(`Open issue "${title}" already exists — skipping.`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['upstream-update'],
            });
            core.info(`Created issue "${title}".`);
