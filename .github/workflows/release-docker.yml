name: Release Docker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override upstream version (e.g. 3.6.6). Defaults to VERSION file."
        required: false

env:
  DOCKER_USERNAME: 851708184
  IMAGE_NAME: siyuan

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          # ponytail: VERSION file is the single source of truth; input overrides upstream part only.
          if [ -n "${{ github.event.inputs.version }}" ]; then
            OVR="${{ github.event.inputs.version }}"
            OVR="${OVR#v}"
            sed -i "s/^UPSTREAM_VERSION=.*/UPSTREAM_VERSION=${OVR}/" VERSION
            echo "overrode upstream to ${OVR}"
          fi
          source VERSION
          echo "upstream=${UPSTREAM_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${UPSTREAM_VERSION}-${PATCH_REVISION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.upstream }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/aatumaykin/unlock-siyuan:${{ steps.version.outputs.tag }}
            ghcr.io/aatumaykin/unlock-siyuan:${{ steps.version.outputs.upstream }}
            ghcr.io/aatumaykin/unlock-siyuan:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
